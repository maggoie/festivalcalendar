<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>节日历 · 少数民族节日</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #FFF8F0;
  --bg2:       #FFF0E0;
  --bg3:       #FFEBD0;
  --card:      #FFFFFF;
  --text:      #3D2B1F;
  --text2:     #8C6B55;
  --border:    #F0DCC8;
  --shadow:    rgba(61,43,31,0.08);
  --radius:    16px;
  --radius-sm: 10px;

  --c-dai:     #00C9A7;
  --c-yi:      #FF5E3A;
  --c-miao:    #A855F7;
  --c-zang:    #F43F8E;
  --c-meng:    #3B82F6;
  --c-zhuang:  #22C55E;
  --c-chaoxian:#F59E0B;
  --c-weiwu:   #EF4444;
  --c-bai:     #06B6D4;
  --c-tujia:   #EAB308;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  min-height: 100vh;
}

/* ── 顶部 header ── */
.header {
  background: var(--card);
  border-bottom: 2px solid var(--border);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-icon {
  width: 40px; height: 40px;
  background: #FF5E3A;
  border-radius: 12px;
  display: flex; align-items:center; justify-content:center;
  font-size: 1.3rem;
}

.logo-text {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.4rem;
  color: var(--text);
  letter-spacing: 0.05em;
}

.logo-sub {
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 0.1em;
  display: block;
  margin-top: -2px;
}

/* 视图切换 */
.view-toggle {
  display: flex;
  background: var(--bg2);
  border-radius: 12px;
  padding: 4px;
  gap: 2px;
}

.toggle-btn {
  padding: 6px 18px;
  border-radius: 9px;
  border: none;
  background: transparent;
  color: var(--text2);
  font-size: 0.82rem;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
  display: flex; align-items: center; gap: 5px;
}

.toggle-btn.active {
  background: var(--card);
  color: var(--text);
  box-shadow: 0 2px 8px var(--shadow);
}

/* 年份导航 */
.year-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-btn {
  width: 34px; height: 34px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: all 0.15s;
}
.nav-btn:hover { background: var(--bg3); border-color: #D0B090; }

.year-label {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.1rem;
  color: var(--text);
  min-width: 60px;
  text-align: center;
}

/* ── 主内容 ── */
.main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ── 整年视图 ── */
.year-view {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

@media (max-width: 900px) { .year-view { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 620px) { .year-view { grid-template-columns: repeat(2, 1fr); } }

.mini-month {
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 12px;
  box-shadow: 0 2px 12px var(--shadow);
  border: 1.5px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}

.mini-month::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--month-color, #FF5E3A);
  border-radius: var(--radius) var(--radius) 0 0;
}

.mini-month:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px var(--shadow);
}

.mini-month-title {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1rem;
  color: var(--text);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.mini-festival-count {
  font-size: 0.65rem;
  background: var(--bg2);
  color: var(--text2);
  padding: 2px 7px;
  border-radius: 20px;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
}

/* 小日历格 */
.mini-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}

.mini-day-label {
  font-size: 0.55rem;
  text-align: center;
  color: var(--text2);
  padding: 2px 0 3px;
  opacity: 0.6;
}

.mini-cell {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  color: var(--text2);
  border-radius: 6px;
  position: relative;
}

.mini-cell.has-fest {
  background: var(--fest-color, #FF5E3A);
  color: white;
  font-weight: 700;
  border-radius: 8px;
}

.mini-cell.today-mark {
  border: 1.5px solid var(--text);
  color: var(--text);
  font-weight: 700;
}

/* 节日徽章行 */
.mini-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 8px;
}

.mini-badge {
  font-size: 0.58rem;
  padding: 2px 6px;
  border-radius: 20px;
  color: white;
  font-weight: 500;
  white-space: nowrap;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ── 单月视图 ── */
.month-view { display: none; }
.month-view.active { display: block; }
.year-view.hidden { display: none; }

.month-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 1.5rem;
}

.month-title-big {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 2rem;
  color: var(--text);
}

.month-sub {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 2px;
}

.back-btn {
  width: 38px; height: 38px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.back-btn:hover { background: var(--bg3); }

/* 星期标题行 */
.weekrow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 6px;
}

.weekrow-label {
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text2);
  padding: 4px;
  letter-spacing: 0.05em;
}

/* 月历格 */
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day-cell {
  background: var(--card);
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  min-height: 100px;
  padding: 8px;
  position: relative;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
}

.day-cell.empty {
  background: transparent;
  border-color: transparent;
  box-shadow: none;
}

.day-cell.has-festival {
  cursor: pointer;
  border-color: var(--border);
}

.day-cell.has-festival:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--shadow);
  border-color: #D0B090;
}

.day-cell.today {
  background: #FFF8E8;
  border-color: #F59E0B;
  border-width: 2px;
}

.day-num {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
}

.day-cell.today .day-num {
  color: #F59E0B;
}

.day-lunar {
  font-size: 0.58rem;
  color: var(--text2);
  margin-top: 2px;
  opacity: 0.7;
}

.day-badges {
  margin-top: auto;
  padding-top: 4px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

/* 节日徽章 */
.badge {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.62rem;
  line-height: 1.2;
  padding: 3px 6px 3px 4px;
  border-radius: 8px;
  font-weight: 500;
  color: white;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
  overflow: hidden;
}
.badge:hover { opacity: 0.85; }

.badge-icon {
  font-size: 0.85rem;
  flex-shrink: 0;
  line-height: 1;
}

.badge-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── 图例 ── */
.legend-section {
  margin-top: 2rem;
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 1.2rem 1.5rem;
}

.legend-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 0.15em;
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.legend-clear-btn {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text2);
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px 10px;
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  letter-spacing: 0.05em;
  transition: all 0.15s;
  opacity: 0;
  pointer-events: none;
}
.legend-clear-btn.visible {
  opacity: 1;
  pointer-events: all;
}
.legend-clear-btn:hover { background: var(--bg3); color: var(--text); }

.legend-items {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* filter pill */
.filter-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--text2);
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 5px 12px 5px 6px;
  cursor: pointer;
  transition: all 0.18s;
  user-select: none;
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 500;
}
.filter-pill:hover {
  border-color: var(--pill-color);
  color: var(--text);
  background: var(--card);
}
.filter-pill.active {
  background: var(--pill-color);
  border-color: var(--pill-color);
  color: white;
  box-shadow: 0 2px 8px color-mix(in srgb, var(--pill-color) 35%, transparent);
}
.filter-pill.dimmed {
  opacity: 0.35;
}

.pill-icon {
  width: 24px; height: 24px;
  border-radius: 50%;
  display: flex; align-items:center; justify-content:center;
  font-size: 0.95rem;
  background: rgba(0,0,0,0.06);
  flex-shrink: 0;
  transition: background 0.18s;
}
.filter-pill.active .pill-icon {
  background: rgba(255,255,255,0.2);
}

/* ── 详情弹窗 ── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(61,43,31,0.5);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.overlay.show {
  opacity: 1;
  pointer-events: all;
}

.detail-panel {
  background: var(--card);
  border-radius: 24px;
  max-width: 440px;
  width: 100%;
  overflow: hidden;
  transform: scale(0.95) translateY(12px);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 20px 60px rgba(61,43,31,0.2);
}

.overlay.show .detail-panel {
  transform: scale(1) translateY(0);
}

/* 详情顶部彩色区 */
.detail-top {
  padding: 2rem 1.8rem 1.6rem;
  position: relative;
  color: white;
}

.detail-top-deco {
  position: absolute;
  inset: 0;
  opacity: 0.15;
  background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='8' fill='white' fill-opacity='0.3'/%3E%3Ccircle cx='0' cy='0' r='4' fill='white' fill-opacity='0.2'/%3E%3Ccircle cx='40' cy='40' r='4' fill='white' fill-opacity='0.2'/%3E%3C/svg%3E");
}

.detail-close {
  position: absolute;
  top: 14px; right: 14px;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.4);
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  transition: background 0.15s;
  z-index: 1;
}
.detail-close:hover { background: rgba(255,255,255,0.3); }

.detail-ethnic-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  position: relative;
  z-index: 1;
}

.detail-ethnic-icon {
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  display: flex; align-items:center; justify-content:center;
  font-size: 1.4rem;
}

.detail-ethnic-name {
  font-size: 0.85rem;
  font-weight: 700;
  opacity: 0.9;
  letter-spacing: 0.05em;
}

.detail-fest-name {
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.8rem;
  letter-spacing: 0.05em;
  position: relative;
  z-index: 1;
  line-height: 1.2;
}

.detail-date-label {
  font-size: 0.78rem;
  opacity: 0.8;
  margin-top: 4px;
  position: relative;
  z-index: 1;
  letter-spacing: 0.08em;
}

/* 详情内容区 */
.detail-body {
  padding: 1.5rem 1.8rem;
}

.detail-desc {
  font-size: 0.9rem;
  line-height: 1.9;
  color: var(--text);
  margin-bottom: 1.2rem;
}

.detail-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 1.4rem;
}

.chip {
  font-size: 0.73rem;
  padding: 4px 12px;
  border-radius: 20px;
  background: var(--bg2);
  color: var(--text2);
  font-weight: 500;
  border: 1px solid var(--border);
}

.game-btn {
  width: 100%;
  padding: 0.95rem;
  border-radius: 14px;
  border: none;
  font-family: 'ZCOOL KuaiLe', cursive;
  font-size: 1.05rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  color: white;
  transition: transform 0.15s, opacity 0.15s;
  display: flex; align-items: center; justify-content:center; gap: 8px;
}
.game-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.game-btn:active { transform: scale(0.98); }

/* ── 月份顶色条 ── */
.month-colors = ['#FF5E3A','#F59E0B','#22C55E','#3B82F6','#A855F7','#F43F8E',
                  '#00C9A7','#EF4444','#06B6D4','#EAB308','#FF5E3A','#F43F8E'];

@media (max-width: 600px) {
  .day-cell { min-height: 72px; padding: 5px; }
  .day-num { font-size: 0.8rem; }
  .badge { font-size: 0.55rem; padding: 2px 4px 2px 3px; }
  .badge-icon { font-size: 0.72rem; }
  .day-lunar { display: none; }
}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">🎪</div>
    <div>
      <div class="logo-text">节日历</div>
      <span class="logo-sub">中国少数民族节日</span>
    </div>
  </div>

  <div class="view-toggle">
    <button class="toggle-btn active" id="btn-year" onclick="setView('year')">
      🗓 整年
    </button>
    <button class="toggle-btn" id="btn-month" onclick="setView('month')">
      📅 月历
    </button>
  </div>

  <div class="year-nav">
    <button class="nav-btn" onclick="changeYear(-1)">‹</button>
    <div class="year-label" id="year-label">2025</div>
    <button class="nav-btn" onclick="changeYear(1)">›</button>
  </div>
</header>

<!-- ── 主内容 ── -->
<div class="main">

  <!-- 整年视图 -->
  <div class="year-view" id="year-view"></div>

  <!-- 单月视图 -->
  <div class="month-view" id="month-view">
    <div class="month-header">
      <button class="back-btn" onclick="setView('year')" title="返回整年">←</button>
      <div>
        <div class="month-title-big" id="month-title-big"></div>
        <div class="month-sub" id="month-sub"></div>
      </div>
      <div style="display:flex;gap:6px;margin-left:auto">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <div class="weekrow">
      <div class="weekrow-label">日</div>
      <div class="weekrow-label">一</div>
      <div class="weekrow-label">二</div>
      <div class="weekrow-label">三</div>
      <div class="weekrow-label">四</div>
      <div class="weekrow-label">五</div>
      <div class="weekrow-label">六</div>
    </div>

    <div class="month-grid" id="month-grid"></div>

    <div class="legend-section" style="margin-top:1.5rem">
      <div class="legend-title">
        <span>民 族 筛 选</span>
        <button class="legend-clear-btn" id="clear-btn-month" onclick="clearFilter()">✕ 清除筛选</button>
      </div>
      <div class="legend-items" id="legend-items"></div>
    </div>
  </div>

</div>

<!-- 整年筛选 -->
<div style="max-width:1100px;margin:0 auto;padding:0 1.5rem 3rem" id="year-legend-wrap">
  <div class="legend-section">
    <div class="legend-title">
      <span>民 族 筛 选</span>
      <button class="legend-clear-btn" id="clear-btn-year" onclick="clearFilter()">✕ 清除筛选</button>
    </div>
    <div class="legend-items" id="legend-items-year"></div>
  </div>
</div>

<!-- ── 详情弹窗 ── -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="detail-top" id="detail-top">
      <div class="detail-top-deco"></div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
      <div class="detail-ethnic-row">
        <div class="detail-ethnic-icon" id="d-icon"></div>
        <div class="detail-ethnic-name" id="d-ethnic"></div>
      </div>
      <div class="detail-fest-name" id="d-name"></div>
      <div class="detail-date-label" id="d-date"></div>
    </div>
    <div class="detail-body">
      <div class="detail-desc" id="d-desc"></div>
      <div class="detail-chips" id="d-chips"></div>
      <button class="game-btn" id="d-game-btn" onclick="alert('🎮 游戏模块即将接入！')">
        <span>🎮</span><span>进入节日小游戏</span>
      </button>
    </div>
  </div>
</div>

<script>
// ── 民族数据 ──────────────────────────────
const ETHNIC = {
  dai:      { name:'傣族',     color:'#00C9A7', icon:'🦚' },
  yi:       { name:'彝族',     color:'#FF5E3A', icon:'🔥' },
  miao:     { name:'苗族',     color:'#A855F7', icon:'🪘' },
  zang:     { name:'藏族',     color:'#F43F8E', icon:'⛰️' },
  meng:     { name:'蒙古族',   color:'#3B82F6', icon:'🐴' },
  zhuang:   { name:'壮族',     color:'#22C55E', icon:'🥁' },
  chaoxian: { name:'朝鲜族',   color:'#F59E0B', icon:'🎋' },
  weiwu:    { name:'维吾尔族', color:'#EF4444', icon:'🍎' },
  bai:      { name:'白族',     color:'#06B6D4', icon:'🎨' },
  tujia:    { name:'土家族',   color:'#EAB308', icon:'🧶' },
};

// 月份顶色
const MONTH_COLORS = [
  '#FF5E3A','#F59E0B','#22C55E','#3B82F6',
  '#A855F7','#F43F8E','#00C9A7','#EF4444',
  '#06B6D4','#EAB308','#FF8C42','#E879A0'
];

const MONTH_NAMES_ZH = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

const LUNAR = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
               '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
               '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

// ── 状态 ──────────────────────────────────
const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth() + 1;
let currentView = 'year';
let activeFilters = new Set(); // 空 = 显示全部

// ── 辅助函数 ──────────────────────────────
function getFilteredFests(month, day) {
  return FESTIVALS.filter(f =>
    f.month === month && f.day === day &&
    (activeFilters.size === 0 || activeFilters.has(f.ethnic))
  );
}

function getFilteredFestsInMonth(month) {
  return FESTIVALS.filter(f =>
    f.month === month &&
    (activeFilters.size === 0 || activeFilters.has(f.ethnic))
  );
}

function getLunar(d) { return LUNAR[(d-1) % 30]; }

function updateClearBtns() {
  const vis = activeFilters.size > 0;
  ['clear-btn-year','clear-btn-month'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('visible', vis);
  });
}

// ── 筛选交互 ──────────────────────────────
function toggleFilter(key) {
  if (activeFilters.has(key)) {
    activeFilters.delete(key);
  } else {
    activeFilters.add(key);
  }
  updateClearBtns();
  syncPillStates();
  if (currentView === 'year') renderYearView();
  else renderMonthView();
}

function clearFilter() {
  activeFilters.clear();
  updateClearBtns();
  syncPillStates();
  if (currentView === 'year') renderYearView();
  else renderMonthView();
}

function syncPillStates() {
  document.querySelectorAll('.filter-pill').forEach(pill => {
    const k = pill.dataset.key;
    const isActive = activeFilters.has(k);
    const anyActive = activeFilters.size > 0;
    pill.classList.toggle('active', isActive);
    pill.classList.toggle('dimmed', anyActive && !isActive);
  });
}

// ── 整年视图 ──────────────────────────────
function renderYearView() {
  const container = document.getElementById('year-view');
  container.innerHTML = '';
  document.getElementById('year-label').textContent = currentYear;

  for (let m = 1; m <= 12; m++) {
    const fests = getFilteredFestsInMonth(m);
    const allFests = FESTIVALS.filter(f => f.month === m); // 原始总数用于格子着色
    const color = MONTH_COLORS[m - 1];
    const firstDay = new Date(currentYear, m-1, 1).getDay();
    const daysInMonth = new Date(currentYear, m, 0).getDate();

    const card = document.createElement('div');
    card.className = 'mini-month';
    card.style.setProperty('--month-color', color);

    let miniCells = '';
    ['日','一','二','三','四','五','六'].forEach(d => {
      miniCells += `<div class="mini-day-label">${d}</div>`;
    });
    for (let i = 0; i < firstDay; i++) miniCells += '<div></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const fs = getFilteredFests(m, d);
      const isToday = d === today.getDate() && m === today.getMonth()+1 && currentYear === today.getFullYear();
      if (fs.length > 0) {
        const c = ETHNIC[fs[0].ethnic]?.color || color;
        miniCells += `<div class="mini-cell has-fest" style="background:${c}">${d}</div>`;
      } else {
        miniCells += `<div class="mini-cell${isToday?' today-mark':''}">${d}</div>`;
      }
    }

    const badgeHtml = fests.slice(0, 3).map(f => {
      const e = ETHNIC[f.ethnic];
      return `<span class="mini-badge" style="background:${e.color}">${e.icon} ${f.name}</span>`;
    }).join('') + (fests.length > 3 ? `<span class="mini-badge" style="background:#999">+${fests.length-3}</span>` : '');

    card.innerHTML = `
      <div class="mini-month-title">
        <span>${MONTH_NAMES_ZH[m-1]}</span>
        ${fests.length > 0 ? `<span class="mini-festival-count">${fests.length} 个节日</span>` : ''}
      </div>
      <div class="mini-grid">${miniCells}</div>
      ${fests.length > 0 ? `<div class="mini-badges">${badgeHtml}</div>` : ''}
    `;

    card.addEventListener('click', () => {
      currentMonth = m;
      setView('month');
    });

    container.appendChild(card);
  }
}

// ── 单月视图 ──────────────────────────────
function renderMonthView() {
  const grid = document.getElementById('month-grid');
  grid.innerHTML = '';

  document.getElementById('month-title-big').textContent = `${currentYear}年 ${MONTH_NAMES_ZH[currentMonth-1]}`;
  document.getElementById('month-sub').textContent = `${MONTH_NAMES_EN[currentMonth-1]} ${currentYear}`;

  const firstDay = new Date(currentYear, currentMonth-1, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement('div');
    e.className = 'day-cell empty';
    grid.appendChild(e);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const fests = getFilteredFests(currentMonth, d);
    const isToday = d === today.getDate() && currentMonth === today.getMonth()+1 && currentYear === today.getFullYear();

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (fests.length > 0 ? ' has-festival' : '') + (isToday ? ' today' : '');

    const badgesHtml = fests.slice(0, 2).map(f => {
      const e = ETHNIC[f.ethnic];
      return `<div class="badge" style="background:${e.color}" onclick="event.stopPropagation();openDetail(${JSON.stringify(f).replace(/"/g,'&quot;')})">
        <span class="badge-icon">${e.icon}</span>
        <span class="badge-name">${f.name}</span>
      </div>`;
    }).join('');

    cell.innerHTML = `
      <span class="day-num">${d}</span>
      <span class="day-lunar">${getLunar(d)}</span>
      <div class="day-badges">${badgesHtml}</div>
    `;

    if (fests.length > 0) {
      cell.addEventListener('click', () => openDetail(fests[0]));
    }

    grid.appendChild(cell);
  }

  renderFilter('legend-items');
}

// ── 筛选器渲染 ────────────────────────────
function renderFilter(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = Object.entries(ETHNIC).map(([k, v]) => {
    const isActive = activeFilters.has(k);
    const anyActive = activeFilters.size > 0;
    return `
      <button class="filter-pill${isActive?' active':''}${anyActive&&!isActive?' dimmed':''}"
        data-key="${k}"
        style="--pill-color:${v.color}"
        onclick="toggleFilter('${k}')">
        <span class="pill-icon">${v.icon}</span>
        <span>${v.name}</span>
      </button>
    `;
  }).join('');
}

// ── 详情弹窗 ──────────────────────────────
function openDetail(fest) {
  if (typeof fest === 'string') fest = JSON.parse(fest);
  const e = ETHNIC[fest.ethnic];
  const top = document.getElementById('detail-top');
  top.style.background = e.color;

  document.getElementById('d-icon').textContent = e.icon;
  document.getElementById('d-ethnic').textContent = e.name + ' · ' + fest.facts[0];
  document.getElementById('d-name').textContent = fest.name;
  document.getElementById('d-date').textContent = `${currentYear}年 ${MONTH_NAMES_ZH[fest.month-1]}${fest.day}日 · ${fest.facts[1]}`;
  document.getElementById('d-desc').textContent = fest.desc;
  document.getElementById('d-chips').innerHTML = fest.facts.slice(2).map(f =>
    `<span class="chip">${f}</span>`).join('');
  document.getElementById('d-game-btn').style.background = e.color;

  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeDetail();
}

// ── 视图切换 ──────────────────────────────
function setView(v) {
  currentView = v;
  const yv = document.getElementById('year-view');
  const mv = document.getElementById('month-view');
  const yw = document.getElementById('year-legend-wrap');

  document.getElementById('btn-year').classList.toggle('active', v === 'year');
  document.getElementById('btn-month').classList.toggle('active', v === 'month');

  if (v === 'year') {
    yv.classList.remove('hidden');
    mv.classList.remove('active');
    yw.style.display = '';
    renderYearView();
    renderFilter('legend-items-year');
    syncPillStates();
    updateClearBtns();
  } else {
    yv.classList.add('hidden');
    mv.classList.add('active');
    yw.style.display = 'none';
    renderMonthView();
    syncPillStates();
    updateClearBtns();
  }
}

function changeYear(d) {
  currentYear += d;
  if (currentView === 'year') renderYearView();
  else renderMonthView();
}

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  renderMonthView();
  document.getElementById('year-label').textContent = currentYear;
}

// ── 初始化 ────────────────────────────────
setView('year');
</script>
